<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NutriScan</title>
    <style>
        body { 
            background-color: #0b110e; 
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e2e8f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; margin: 0;
        }
        .search-box { display: flex; width: 100%; max-width: 600px; background: #111827; border: 1px solid #334155; border-radius: 30px; padding: 5px; margin-bottom: 20px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 15px 20px; outline: none; }
        button { background: #22c55e; color: #000; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; }
        #result { margin-top: 30px; width: 100%; max-width: 600px; background: #111827; padding: 20px; border-radius: 15px; display: none; }
        .nutrisi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .nutrisi-box { background: #1e293b; padding: 15px; border-radius: 10px; text-align: center; }
        .nutrisi-val { font-size: 24px; font-weight: bold; color: #22c55e; display: block; }
        pre { white-space: pre-wrap; color: #cbd5e1; }
    </style>
</head>
<body>
    <h1>🌿 NutriScan</h1>
    <div class="search-box">
        <input type="text" id="input-makanan" placeholder="Masukkan nama makanan...">
        <button onclick="cariData()">Cari Data</button>
    </div>
    <div id="result">
        <h3 id="food-title"></h3>
        <div class="nutrisi-grid">
            <div class="nutrisi-box">Kalori<span class="nutrisi-val" id="val-kalori">-</span></div>
            <div class="nutrisi-box">Protein<span class="nutrisi-val" id="val-protein">-</span></div>
            <div class="nutrisi-box">Karbo<span class="nutrisi-val" id="val-karbo">-</span></div>
            <div class="nutrisi-box">Lemak<span class="nutrisi-val" id="val-lemak">-</span></div>
        </div>
        <h4>Resep:</h4><pre id="val-resep"></pre>
    </div>
    <script>
        document.getElementById('input-makanan').addEventListener('keypress', (e) => { if(e.key === 'Enter') cariData(); });
        async function cariData() {
            const input = document.getElementById('input-makanan').value;
            const res = await fetch('/api/nutrisi', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ makanan: input }) });
            const data = await res.json();
            if (data.error) { alert(data.error); return; }
            document.getElementById('food-title').innerText = input;
            document.getElementById('val-kalori').innerText = data.kalori;
            document.getElementById('val-protein').innerText = data.protein;
            document.getElementById('val-karbo').innerText = data.karbohidrat;
            document.getElementById('val-lemak').innerText = data.lemak;
            document.getElementById('val-resep').innerText = data.resep;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
